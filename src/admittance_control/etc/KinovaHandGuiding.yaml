Name: KinovaHandGuiding
MainRobot: kinova_6dof  # CHANGE: must match the robot module name exactly (lowercase, as shown in [success] log output)

Timestep: 0.005

# CHANGE: StatesLibraries should be paths, not library names.
# mc_rtc resolves these relative to the controller's install prefix.
# Leave out AdmittanceStates here — it's auto-discovered from
# lib/mc_controller/KinovaHandGuiding/ (the install path fix from CMake).
# The built-in states (MetaTask, etc.) are always loaded automatically,
# so this line can be removed entirely unless you have extra state dirs.
# StatesLibraries: []   ← just delete the line

Managed: false
StepByStep: false

ObserverPipelines:
  - name: MainPipeline
    observers:
      - type: Encoder
        update: true
        log: true
        config:
          position: encoderValues
          velocity: encoderVelocities

constraints:
  - type: kinematics
    damper: [0.1, 0.01, 0.5]
  - type: dynamics
    damper: [0.1, 0.01, 0.5]
  - type: collision
    useMinimal: true

transitions:
  - [Init,         OK,           HoldPosition, Auto]
  - [HoldPosition, startGuiding, HandGuide,    Auto]
  - [HandGuide,    stopGuiding,  HoldPosition, Auto]

init: Init

states:

  Init:
    base: MetaTasks
    completion:
      timeElapsed: true
      timeout: 0.01

  # CHANGE: Add UpdateHoldTarget as a sub-state of HoldPosition so it
  # re-seeds the PostureTask from encoder values on every entry.
  # Without this, your UpdateHoldTarget state is compiled but never used.
  HoldPosition:
    base: MetaTasks
    tasks:
      HoldPosture:
        type: posture
        stiffness: 10.0
        weight: 100.0
    gui:
      - Control:
          - [Button, "Start Hand-Guiding", startGuiding]

  # CHANGE: Add the UpdateHoldTarget state so transitions can reach it.
  # It runs once on entry then immediately outputs "OK" — wire it between
  # HandGuide and HoldPosition so posture is re-seeded after each guiding session.
  UpdateHoldTarget:
    base: UpdateHoldTarget  # references your EXPORT_SINGLE_STATE name

  HandGuide:
    base: MetaTasks
    tasks:
      GravComp:
        type: admittance
        surface: Arm
        forceSensor: EEForceSensor
        admittance: [0.0005, 0.0005, 0.0005, 0.0005, 0.0005, 0.0005]
        stiffness:  [0.0001, 0.0001, 0.0001, 0.0001, 0.0001, 0.0001]
        damping:    [50.0, 50.0, 50.0, 50.0, 50.0, 50.0]
        wrench:
          force:  [0.0, 0.0, 0.0]
          couple: [0.0, 0.0, 0.0]
        maxVel:
          linear:  [0.15, 0.15, 0.15]
          angular: [0.30, 0.30, 0.30]
        weight: 1000.0
      NullspacePosture:
        type: posture
        stiffness: 1.0
        weight: 1.0
    gui:
      - Control:
          - [Button, "Stop Hand-Guiding", stopGuiding]

# CHANGE: Update transitions to route through UpdateHoldTarget
# so the posture is re-seeded from encoders before holding position.
# Replace the original transitions block at the top with this:
transitions:
  - [Init,              OK,           HoldPosition,     Auto]
  - [HoldPosition,      startGuiding, HandGuide,        Auto]
  - [HandGuide,         stopGuiding,  UpdateHoldTarget, Auto]  # ← go re-seed first
  - [UpdateHoldTarget,  OK,           HoldPosition,     Auto]  # ← then hold
