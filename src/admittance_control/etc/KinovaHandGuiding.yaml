Name: KinovaHandGuiding
MainRobot: Kinova6DOF
Timestep: 0.005
Managed: false
StepByStep: false

ObserverPipelines:
  - name: MainPipeline
    observers:
      - type: Encoder
        update: true
        log: true
        position: encoderValues
        velocity: encoderVelocities

constraints:
  - type: kinematics
    damper: [0.1, 0.01, 0.5]
  - type: collision
    collisions:
      - body1: bracelet_link
        body2: base_link
        iDist: 0.05
        sDist: 0.02
        damping: 0.0
      - body1: forearm_link
        body2: base_link
        iDist: 0.05
        sDist: 0.02
        damping: 0.0

transitions:
  - [Init,              OK,             HoldPosition,     Auto]
  - [HoldPosition,      startGuiding,   HandGuide,        Auto]
  - [HandGuide,         stopGuiding,    UpdateHoldTarget, Auto]
  - [UpdateHoldTarget,  OK,             HoldPosition,     Auto]

init: Init

states:

  Init:
    base: MetaTasks
    completion:
      timeElapsed: true
      timeout: 0.01

  HoldPosition:
    base: KHG::HoldPositionState

  HandGuide:
    base: KHG::HandGuideState

  UpdateHoldTarget:
    base: KHG::UpdateHoldTarget
