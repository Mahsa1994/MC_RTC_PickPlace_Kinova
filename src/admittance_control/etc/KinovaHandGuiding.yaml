Name: KinovaHandGuiding
MainRobot: Kinova6DOF

Timestep: 0.005

Managed: false
StepByStep: false

ObserverPipelines:
  - name: MainPipeline
    observers:
      - type: Encoder
        update: true
        log: true
        config:
          position: encoderValues
          velocity: encoderVelocities

#constraints:
#  - type: kinematics
#    damper: [0.1, 0.01, 0.5]
##  - type: dynamics
##   damper: [0.1, 0.01, 0.5]
#  - type: collision
#    useMinimal: true
constraints:
  - type: kinematics
    damper: [0.1, 0.01, 0.5]
  - type: collision
    collisions:
      - body1: bracelet_link
        body2: base_link
        iDist: 0.05
        sDist: 0.02
        damping: 0.0
      - body1: forearm_link
        body2: base_link
        iDist: 0.05
        sDist: 0.02
        damping: 0.0

# Consolidated transitions routing through your custom C++ state
transitions:
  - [Init,              OK,           HoldPosition,     Auto]
  - [HoldPosition,      startGuiding, HandGuide,        Auto]
  - [HandGuide,         stopGuiding,  UpdateHoldTarget, Auto]  # Route through the C++ state to re-seed posture
  - [UpdateHoldTarget,  OK,           HoldPosition,     Auto]  # Then return to holding position

init: Init

states:

  Init:
    base: MetaTasks
    completion:
      timeElapsed: true
      timeout: 0.01

  HoldPosition:
    base: MetaTasks
    tasks:
      HoldPosture:
        type: posture
        stiffness: 10.0
        weight: 100.0
    gui:
      - Control:
          - [Button, "Start Hand-Guiding", startGuiding]

  # UpdateHoldTarget is removed from here because the C++ state is loaded automatically

  HandGuide:
    base: MetaTasks
    tasks:
      GravComp:
        type: admittance
#        surface: Arm
        surface: tool_frame
        forceSensor: EEForceSensor
        admittance: [0.0005, 0.0005, 0.0005, 0.0005, 0.0005, 0.0005]
        stiffness:  [0.0001, 0.0001, 0.0001, 0.0001, 0.0001, 0.0001]
        damping:    [50.0, 50.0, 50.0, 50.0, 50.0, 50.0]
        wrench:
          force:  [0.0, 0.0, 0.0]
          couple: [0.0, 0.0, 0.0]
        maxVel:
          linear:  [0.15, 0.15, 0.15]
          angular: [0.30, 0.30, 0.30]
        weight: 1000.0
      NullspacePosture:
        type: posture
        stiffness: 1.0
        weight: 1.0
    gui:
      - Control:
          - [Button, "Stop Hand-Guiding", stopGuiding]
