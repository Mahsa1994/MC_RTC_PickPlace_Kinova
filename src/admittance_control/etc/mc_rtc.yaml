# =============================================================================
#  Corrected Global Config
# =============================================================================

MainRobot: Kinova6DOF
Enabled: KinovaHandGuiding
Timestep: 0.005

Plugins:
  - ROS

# 1. Where to look for Controller .so files (Directories)
ControllerModulePaths:
  - /usr/local/lib/mc_controller
  - /home/vscode/workspace/install/admittance_control/lib/mc_controller

# 2. Where to look for State .so files (Directories)
# CHANGE: Use 'StatesLibrariesPaths' for directory lists
StatesLibrariesPaths:
  - /usr/local/lib/mc_states
  - /home/vscode/workspace/install/admittance_control/lib/mc_states

# 3. Which specific state libraries to load (Names)
# mc_control_fsm_states contains MetaTasks, Init, etc.
# AdmittanceStates contains your UpdateHoldTarget.
StatesLibraries:
  - mc_control_fsm_states
  - AdmittanceStates

ObserverPipelines:
  - name: MainPipeline
    observers:
      - type: Encoder
        update: true
        log: true
        config:
          position: encoderValues
          velocity: encoderVelocities
