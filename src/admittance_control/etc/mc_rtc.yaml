# =============================================================================
#  mc_rtc.yaml  —  system-level config for the hand-guiding controller
#
#  Copy to: ~/.config/mc_rtc/mc_rtc.yaml
#  (replaces the PickPlaceController entry while testing hand-guiding)
# =============================================================================

MainRobot: Kinova6DOF
Enabled: KinovaHandGuiding
Timestep: 0.005

Plugins:
  - ROS

LogPolicy: threaded

# The controller's shared library lives here after `cmake --install`
ControllerModulePaths:
  - /home/vscode/workspace/install/admittance_control/lib/mc_controller

# The UpdateHoldTarget FSM state lives in the same install tree
StatesLibraries:
  - /home/vscode/workspace/install/admittance_control/lib/mc_states

ObserverPipelines:
  - name: MainPipeline
    observers:
      - type: Encoder
        update: true
        log: true
        config:
          position: encoderValues
          velocity: encoderVelocities
          # Note: KinematicInertial is intentionally absent.
          # kinova.cpp clears _bodySensors, so no IMU sensor is registered.
