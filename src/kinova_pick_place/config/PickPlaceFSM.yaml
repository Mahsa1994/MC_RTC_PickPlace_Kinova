## 
# config/PickPlaceFSM.yaml
type: PickPlaceController

robots:
  gen3:
    module: gen3
    timestep: 0.005

# FSM definition
states: [Reset, Approach, Pick, Lift, PlaceApproach, Place]
initial_state: Reset
transitions:
  - [Reset, Approach]
  - [Approach, Pick]
  - [Pick, Lift]
  - [Lift, PlaceApproach]
  - [PlaceApproach, Place]
  - [Place, Reset]

# Parameters forwarded to controller constructor
approach_offset: 0.15
gripper_force_threshold: 5.0

