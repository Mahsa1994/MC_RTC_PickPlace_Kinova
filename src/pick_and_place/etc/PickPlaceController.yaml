MainRobot: Kinova6DOF
ControllerName: PickPlaceController
z_min_limit: 0.15

home_pose:
  translation: [0.287, 0.175, 0.392]
  rotation: [3.0087, 0.0020, 1.7769]

pick_pose:
  translation: [0.40, 0.10, 0.15]
  rotation:    [3.1416, 0.0, 0.0]

place_pose:
  translation: [0.35, -0.10, 0.15]
  rotation:    [3.1416, 0.0, 0.0]

StatesLibraries:
  - /home/vscode/workspace/install/pick_and_place/lib/mc_states

StatesFiles: []
IdleKeepState: true
init: Unfold

states:

  # ── STEP 1: Only testing Unfold ─────────────────────────────────────
  # Arm is currently at the monitoring snapshot pose:
  #   joints (deg): [119.6, 0.5, 87.9, 174.3, 263.6, 87.9]
  # Target is the SAME pose converted to radians — so the arm should
  # barely move. This confirms joint naming and direction are correct
  # before you command any real motion.
  Unfold:
    base: JointMove
    #target: [-0.6933, 0.0449, -1.4642, 3.0964, 1.5793, -1.3926]
    target: [-0.5649, -0.0336, -1.6628, -3.1074, 1.3932, -1.9451]
    duration: 15.0      # very slow — 15 s to move essentially nowhere
    stiffness: 50.0      # minimal gain — arm will move gently
    threshold: 0.05     # 0.05 rad (~3°) convergence threshold
    next: MoveHome          # stop at Idle, do NOT chain to MoveHome yet

  # ── Placeholder states (not used yet) ───────────────────────────────
  MoveHome:
    base: CartesianMove
    target:
      ref: home
    duration: 15.0
    stiffness: 4.0
    weight: 1000.0
    pos_threshold: 0.02
    settle_timeout: 5.0
    next: Idle

  CloseGripper:
    base: Gripper
    action: close
    timeout: 2.0
    next: Idle

  OpenGripper:
    base: Gripper
    action: open
    timeout: 3.0
    next: Idle

transitions:
  - [Unfold,    MoveHome, MoveHome, Auto]
  - [MoveHome,  Idle,     Idle,     Auto]
constraints:
  - type: kinematics
  - type: dynamics
    damper: [0.1, 0.01, 0.5]
  - type: collision
    r1: kinova_6dof
    r2: kinova_6dof
    collisions:
      - type: all
        iDist: 0.15
        sDist: 0.05
        damping: 0.0
